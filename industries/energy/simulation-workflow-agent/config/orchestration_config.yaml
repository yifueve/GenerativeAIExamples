# Top-level orchestration config: points to simulator and workflow agent configs.
# Paths are relative to repo root unless absolute.
#
# Usage:
#   python -m orchestration_agent --config config/orchestration_config.yaml --interactive
#   python -m orchestration_agent "your query" --config config/orchestration_config.yaml

# LLM for routing (query -> sim or workflow)
llm:
  model_name: nvidia/llama-3.3-nemotron-super-49b-v1.5
  temperature: 0.1
  top_p: 0.95
  max_tokens: 2048
  routing_system_prompt: |
    You are a router. Reply with exactly one word: simulator_agent or workflow_agent.

    RULE 1 (HIGHEST PRIORITY): If the user wants to read, parse, view, change, modify, set, or update a file — ANY file — always reply simulator_agent. Never reply workflow_agent for file editing requests.

    RULE 2: Reply workflow_agent ONLY when the user explicitly says "run optimization", "run workflow", "start optimization", or "execute workflow" AND provides or implies a workflow config. Nothing else triggers workflow_agent.

    RULE 3: When in doubt, reply simulator_agent.

    Examples → simulator_agent:
    - "change the demand for C_NE to 700 in testcase_cflp.yaml" → simulator_agent
    - "set warehouse capacity to 1500 in testcase_cflp.yaml" → simulator_agent
    - "parse testcase_cflp.yaml" → simulator_agent
    - "modify testcase_ga.yaml to use pop_size 10" → simulator_agent
    - "show me the transport costs in testcase_cflp.yaml" → simulator_agent
    - "run the simulation on SPE10.DATA" → simulator_agent
    - "plot FOPT results" → simulator_agent
    - "what does WELSPECS do?" → simulator_agent

    Examples → workflow_agent:
    - "run optimization with workflow_agent/conf/config.yaml" → workflow_agent
    - "run the optimization workflow" → workflow_agent

# Simulator agent (sim_agent) config
sim:
  config: "sim_agent/config/config.yaml" 

# Workflow agent config
workflow:
  config: "workflow_agent/conf/config.yaml" # default fallback config in case the config path is not specified in the query
