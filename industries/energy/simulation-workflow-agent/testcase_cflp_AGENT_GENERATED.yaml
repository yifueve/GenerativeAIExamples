# Supply Chain Optimization — Capacitated Facility Location Problem (CFLP)
# Drug Y distribution across NE, Midwest, and West regions
# Tracelink supply chain disruption response scenario
paths:
  sim_dir_base: "dataset/CFLP"
  case_name: "CFLP_DrugY"
  template: "dataset/CFLP/TEMPLATE/cflp.yaml"
algorithm:
  type: "CFLP"
warehouses:
  - id: W_Boston
    location: "Boston, MA"
    capacity: 1200
    fixed_cost: 8000
  - id: W_Chicago
    location: "Chicago, IL"
    capacity: 1500
    fixed_cost: 7000
  - id: W_LA
    location: "Los Angeles, CA"
    capacity: 1000
    fixed_cost: 9000
  - id: W_Atlanta
    location: "Atlanta, GA"
    capacity: 1100
    fixed_cost: 6500
customers:
  - id: C_NE
    location: "Northeast Region (NE)"
    demand: 500
  - id: C_Midwest
    location: "Midwest Region"
    demand: 1000
  - id: C_West
    location: "West Region"
    demand: 400
  - id: C_South
    location: "South Region"
    demand: 350
# Unit transport cost: warehouse -> customer ($/unit)
transport_costs:
  W_Boston_C_NE: 1.2
  W_Boston_C_Midwest: 3.5
  W_Boston_C_West: 6.8
  W_Boston_C_South: 4.1
  W_Chicago_C_NE: 3.0
  W_Chicago_C_Midwest: 1.5
  W_Chicago_C_West: 4.2
  W_Chicago_C_South: 2.8
  W_LA_C_NE: 7.0
  W_LA_C_Midwest: 4.5
  W_LA_C_West: 1.1
  W_LA_C_South: 5.2
  W_Atlanta_C_NE: 3.8
  W_Atlanta_C_Midwest: 3.2
  W_Atlanta_C_West: 5.9
  W_Atlanta_C_South: 1.3
objective:
  mode: "min_cost"
output:
  save_log: true
  save_plots: false